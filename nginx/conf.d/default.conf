# Docker embedded DNS resolver so upstream hostnames resolve at request time.
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Uploaded media (served directly by Nginx).
    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # REST API + websockets.
    location /api/ {
        set $backend "backend:8080";
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Allow large uploads (banners + product images up to 64 MB).
        client_max_body_size 64m;
        proxy_request_buffering off;
    }

    # SEO endpoints proxied to backend.
    location = /robots.txt {
        set $backend "backend:8080";
        proxy_pass http://$backend/robots.txt;
        proxy_set_header Host $host;
    }
    location = /sitemap.xml {
        set $backend "backend:8080";
        proxy_pass http://$backend/sitemap.xml;
        proxy_set_header Host $host;
    }

    # Health.
    location = /health {
        set $backend "backend:8080";
        proxy_pass http://$backend/health;
        proxy_set_header Host $host;
    }

    # Root: placeholder until the Nuxt frontend (phase 2) is deployed.
    location / {
        set $frontend "frontend:3000";
        proxy_pass         http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
