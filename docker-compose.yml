services:
  postgres:
    image: postgres:16-alpine
    container_name: alistroy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alistroy-net

  redis:
    image: redis:7-alpine
    container_name: alistroy-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alistroy-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alistroy-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_PORT: ${API_PORT}
      API_HOST: ${API_HOST}
      API_ENV: ${API_ENV}
      API_LOG_LEVEL: ${API_LOG_LEVEL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES}
      JWT_REFRESH_TTL_HOURS: ${JWT_REFRESH_TTL_HOURS}
      UPLOAD_DIR: ${UPLOAD_DIR}
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB}
      UPLOAD_PUBLIC_BASE: ${UPLOAD_PUBLIC_BASE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST}
      MARKETPLACE_PHONE: ${MARKETPLACE_PHONE}
      MARKETPLACE_WHATSAPP: ${MARKETPLACE_WHATSAPP}
      MARKETPLACE_TELEGRAM: ${MARKETPLACE_TELEGRAM}
      MARKETPLACE_TELEGRAM_USERNAME: ${MARKETPLACE_TELEGRAM_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PHONE: ${ADMIN_PHONE}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      PUBLIC_URL: ${PUBLIC_URL}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URL: ${GOOGLE_OAUTH_REDIRECT_URL}
    volumes:
      - uploads:/app/uploads
    networks:
      - alistroy-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api/v1}
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost}
        NUXT_PUBLIC_UPLOADS_BASE: ${NUXT_PUBLIC_UPLOADS_BASE:-/uploads}
        NUXT_PUBLIC_DEFAULT_LOCALE: ${NUXT_PUBLIC_DEFAULT_LOCALE:-tg}
    container_name: alistroy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api/v1}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost}
      NUXT_PUBLIC_UPLOADS_BASE: ${NUXT_PUBLIC_UPLOADS_BASE:-/uploads}
      NUXT_PUBLIC_DEFAULT_LOCALE: ${NUXT_PUBLIC_DEFAULT_LOCALE:-tg}
      NUXT_API_BASE_INTERNAL: http://backend:8080/api/v1
    networks:
      - alistroy-net

  nginx:
    image: nginx:1.27-alpine
    container_name: alistroy-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - uploads:/var/www/uploads:ro
    networks:
      - alistroy-net

networks:
  alistroy-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  uploads:
